spring.application.name=recifit
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.config.import=optional:file:.env[.properties]

# create, create-drop, update, none
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=1000
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

#Spring Security
jwt.secret-key=${JWT_SECRET_KEY}
jwt.expiry-millis=3600000
jwt.refresh-expiry-millis=604800000

#Food Open Api
food.api.base-url=https://apis.data.go.kr/1471000/FoodNtrCpntDbInfo02/getFoodNtrCpntDbInq02
food.api.service-key=${FOOD_API_SERVICE_KEY}